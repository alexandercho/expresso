name: CI

on:
    pull_request:
    push:

jobs:
    changes:
        runs-on: ubuntu-latest
        outputs:
            frontend_changed: ${{ steps.filter.outputs.frontend }}
        steps:
            - uses: actions/checkout@v4

            - id: filter
              uses: dorny/paths-filter@v3
              with:
                  filters: |
                      frontend:
                        - 'frontend/**'

    lint_frontend:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 26
                  cache: pnpm
            - run: pnpm install:all
            - run: pnpm --dir frontend lint

    lint_backend:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 26
                  cache: pnpm
            - run: pnpm install:all
            - run: pnpm --dir backend lint

    version_match:
        runs-on: ubuntu-latest
        needs:
            - lint_frontend
            - lint_backend
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 26
            - run: node scripts/ci/check-api-version-match.js

    test_api_frontend:
        runs-on: ubuntu-latest
        needs:
            - lint_frontend
            - lint_backend
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 26
                  cache: pnpm
            - run: pnpm install:all
            - run: pnpm test:api:frontend

    test_api_latest:
        runs-on: ubuntu-latest
        needs:
            - lint_frontend
            - lint_backend
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 26
                  cache: pnpm
            - run: pnpm install:all
            - run: pnpm test:api:latest

    test_api_legacy:
        runs-on: ubuntu-latest
        needs:
            - lint_frontend
            - lint_backend
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 26
                  cache: pnpm
            - run: pnpm install:all
            - run: pnpm test:api:legacy

    test_api_deprecated:
        runs-on: ubuntu-latest
        needs:
            - lint_frontend
            - lint_backend
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 26
                  cache: pnpm
            - run: pnpm install:all
            - run: pnpm test:api:deprecated

    deploy_backend_auto:
        runs-on: ubuntu-latest
        if: >
            github.event_name == 'push' &&
            github.ref == 'refs/heads/main' &&
            needs.test_api_frontend.result == 'success' &&
            needs.test_api_latest.result == 'success' &&
            needs.test_api_legacy.result == 'success' &&
            needs.test_api_deprecated.result == 'success'
        needs:
            - test_api_frontend
            - test_api_latest
            - test_api_legacy
            - test_api_deprecated
        steps:
            - run: echo "Automatic backend deploy"

    deploy_backend_manual_notice:
        runs-on: ubuntu-latest
        if: >
            github.event_name == 'push' &&
            github.ref == 'refs/heads/main' &&
            needs.test_api_latest.result == 'success' &&
            needs.test_api_legacy.result == 'success' &&
            needs.test_api_deprecated.result != 'success'
        needs:
            - test_api_latest
            - test_api_legacy
            - test_api_deprecated
        steps:
            - run: echo "Backend is manually deployable because latest and legacy passed but deprecated failed."

    deploy_backend_blocked_notice:
        runs-on: ubuntu-latest
        if: >
            github.event_name == 'push' &&
            github.ref == 'refs/heads/main' &&
            (needs.test_api_latest.result != 'success' || needs.test_api_legacy.result != 'success')
        needs:
            - test_api_latest
            - test_api_legacy
        steps:
            - run: echo "Backend deployment is blocked because latest or legacy API tests failed."

    deploy_frontend_auto:
        runs-on: ubuntu-latest
        if: >
            github.event_name == 'push' &&
            github.ref == 'refs/heads/main' &&
            needs.changes.outputs.frontend_changed == 'true' &&
            needs.version_match.result == 'success' &&
            needs.test_api_frontend.result == 'success' &&
            needs.test_api_latest.result == 'success' &&
            needs.test_api_legacy.result == 'success' &&
            needs.test_api_deprecated.result == 'success'
        needs:
            - changes
            - version_match
            - test_api_frontend
            - test_api_latest
            - test_api_legacy
            - test_api_deprecated
        steps:
            - run: echo "Automatic frontend deploy"

    deploy_frontend_manual_notice:
        runs-on: ubuntu-latest
        if: >
            github.event_name == 'push' &&
            github.ref == 'refs/heads/main' &&
            needs.changes.outputs.frontend_changed == 'true' &&
            needs.version_match.result == 'success' &&
            needs.test_api_frontend.result == 'success' &&
            (needs.test_api_latest.result != 'success' || needs.test_api_legacy.result != 'success' || needs.test_api_deprecated.result != 'success')
        needs:
            - changes
            - version_match
            - test_api_frontend
            - test_api_latest
            - test_api_legacy
            - test_api_deprecated
        steps:
            - run: echo "Frontend is manually deployable because frontend contract checks passed, but other API tests failed."

    deploy_frontend_blocked_notice:
        runs-on: ubuntu-latest
        if: >
            github.event_name == 'push' &&
            github.ref == 'refs/heads/main' &&
            needs.changes.outputs.frontend_changed == 'true' &&
            (needs.version_match.result != 'success' || needs.test_api_frontend.result != 'success')
        needs:
            - changes
            - version_match
            - test_api_frontend
        steps:
            - run: echo "Frontend deployment is blocked because the frontend contract test or API version check failed."
