name: Quality and Release

on:
    pull_request:
        branches:
            - develop
            - main
        types:
            - opened
            - reopened
            - synchronize
            - ready_for_review
    push:
        branches:
            - develop
            - main

jobs:
    changes:
        name: Detect Changed Areas
        runs-on: ubuntu-latest
        outputs:
            backend_changed: ${{ steps.filter.outputs.backend }}
            frontend_changed: ${{ steps.filter.outputs.frontend }}
        steps:
            - uses: actions/checkout@v4

            - id: filter
              uses: dorny/paths-filter@v3
              with:
                  filters: |
                      backend:
                        - 'backend/**'
                      frontend:
                        - 'frontend/**'

    lint_frontend:
        name: Lint Frontend
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 26
                  cache: pnpm
                  cache-dependency-path: |
                      backend/pnpm-lock.yaml
                      frontend/pnpm-lock.yaml
            - run: pnpm install:all
            - run: pnpm --dir frontend lint

    lint_backend:
        name: Lint Backend
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 26
                  cache: pnpm
                  cache-dependency-path: |
                      backend/pnpm-lock.yaml
                      frontend/pnpm-lock.yaml
            - run: pnpm install:all
            - run: pnpm --dir backend lint

    version_match:
        name: Check API Version Match
        runs-on: ubuntu-latest
        needs:
            - lint_frontend
            - lint_backend
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 26
            - run: node scripts/ci/check-api-version-match.js

    test_api_frontend:
        name: Test Frontend API Contract
        runs-on: ubuntu-latest
        needs:
            - lint_frontend
            - lint_backend
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 26
                  cache: pnpm
                  cache-dependency-path: |
                      backend/pnpm-lock.yaml
                      frontend/pnpm-lock.yaml
            - run: pnpm install:all
            - run: pnpm test:api:frontend

    test_api_latest:
        name: Test Latest API
        runs-on: ubuntu-latest
        needs:
            - lint_frontend
            - lint_backend
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 26
                  cache: pnpm
                  cache-dependency-path: |
                      backend/pnpm-lock.yaml
                      frontend/pnpm-lock.yaml
            - run: pnpm install:all
            - run: pnpm test:api:latest

    test_api_legacy:
        name: Test Legacy API
        runs-on: ubuntu-latest
        needs:
            - lint_frontend
            - lint_backend
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 26
                  cache: pnpm
                  cache-dependency-path: |
                      backend/pnpm-lock.yaml
                      frontend/pnpm-lock.yaml
            - run: pnpm install:all
            - run: pnpm test:api:legacy

    test_api_deprecated:
        name: Test Deprecated API
        runs-on: ubuntu-latest
        needs:
            - lint_frontend
            - lint_backend
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 26
                  cache: pnpm
                  cache-dependency-path: |
                      backend/pnpm-lock.yaml
                      frontend/pnpm-lock.yaml
            - run: pnpm install:all
            - run: pnpm test:api:deprecated

    validate_main_pr_source:
        name: Check Main PR Source
        runs-on: ubuntu-latest
        if: github.event_name == 'pull_request' && github.base_ref == 'main'
        steps:
            - name: Ensure only develop can merge into main
              run: |
                  if [ "${{ github.head_ref }}" != "develop" ]; then
                      echo "Only the develop branch can be merged into main."
                      exit 1
                  fi

    validate_release_versions:
        name: Check Production Version Bumps
        runs-on: ubuntu-latest
        if: github.event_name == 'pull_request' && github.head_ref == 'develop' && github.base_ref == 'main'
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: actions/setup-node@v4
              with:
                  node-version: 26

            - run: git fetch origin main

            - run: node scripts/ci/evaluate-version-targets.js origin/main --require-any --allow-initial-versions

    staging_deploy_backend:
        name: Deploy Backend to Staging
        runs-on: ubuntu-latest
        if: >
            github.event_name == 'push' &&
            github.ref == 'refs/heads/develop' &&
            needs.changes.outputs.backend_changed == 'true' &&
            needs.version_match.result == 'success' &&
            needs.test_api_frontend.result == 'success' &&
            needs.test_api_latest.result == 'success' &&
            needs.test_api_legacy.result == 'success' &&
            needs.test_api_deprecated.result == 'success'
        needs:
            - changes
            - version_match
            - test_api_frontend
            - test_api_latest
            - test_api_legacy
            - test_api_deprecated
        steps:
            - run: echo "Staging backend deploy"

    staging_deploy_frontend:
        name: Deploy Frontend to Staging
        runs-on: ubuntu-latest
        if: >
            github.event_name == 'push' &&
            github.ref == 'refs/heads/develop' &&
            needs.changes.outputs.frontend_changed == 'true' &&
            needs.version_match.result == 'success' &&
            needs.test_api_frontend.result == 'success' &&
            needs.test_api_latest.result == 'success' &&
            needs.test_api_legacy.result == 'success' &&
            needs.test_api_deprecated.result == 'success'
        needs:
            - changes
            - version_match
            - test_api_frontend
            - test_api_latest
            - test_api_legacy
            - test_api_deprecated
        steps:
            - run: echo "Staging frontend deploy"

